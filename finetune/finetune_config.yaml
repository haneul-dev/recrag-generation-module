# RECRAG Step 8~9 생성 모듈 — QLoRA 파인튜닝 설정
# 목표: (1) 출력형식/인용/근거성 준수  (2) 답변 품질(answer_f1) 동시 개선
# 환경: Colab T4 (16GB) 기준 — base 모델 4bit(nf4) + LoRA 어댑터 학습.
#
# 단일 진실 소스: 이 파일. 코드에 하드코딩하지 않는다.

meta:
  project: RECRAG
  module: generation_finetune
  scope: step_8_9
  config_version: "0.2-qlora-paper"

# ─────────────────────────────────────────────────────────────
# 1. 합성 데이터 생성 (teacher LLM 으로 정답 타깃 생성)
#    설계 원칙(논문급):
#    - 누수 차단: base 쿼리 단위로 train/val/test 분할. test는 held-out(원본만).
#    - 규모: 코퍼스 기반 신규 쿼리 합성 + 패러프레이즈(train 한정)로 확대.
#    - 품질: 형식·인용 검증 + 중복/길이 필터 + 재현용 manifest(해시/시드/모델).
# ─────────────────────────────────────────────────────────────
synth:
  # teacher = 정답(gold) 출력을 만들어 줄 더 큰 LLM. OpenAI 호환 API.
  teacher:
    provider: "upstage"               # upstage(Solar) | openai | custom
    model: "solar-pro2"               # 예: solar-pro2 / gpt-4o / gpt-4o-mini
    base_url: null                    # null이면 provider 기본값 사용
    api_key_env: "UPSTAGE_API_KEY"    # 환경변수 이름 (openai면 OPENAI_API_KEY)
    temperature: 0.2                  # 정답 생성은 약간의 다양성만
    max_tokens: 768
    request_timeout_s: 60
    max_retries: 3                    # 형식검증 실패 시 재생성 횟수

  # 입력 데이터 (상대경로는 repo 루트 기준 절대화)
  source:
    manual_eval_set: "data/eval_set.manual_top5.jsonl"   # gold context
    corpus: "data/corpus_200.jsonl"                       # 신규쿼리/distractor 원천

  # 누수 없는 분할 (base 쿼리 단위)
  split:
    train_ratio: 0.70
    val_ratio: 0.15
    test_ratio: 0.15
    seed: 42

  # 증강 규모
  augment:
    paraphrases_per_train_query: 4    # train 쿼리당 패러프레이즈 N (val/test=0, 누수방지)
    make_abstain_examples: true       # 근거부족(abstain) 학습 예시 (train/val)
    abstain_distractor_k: 5           # abstain 예시에 넣을 무관 청크 수
    synth_queries_from_corpus: 60     # 코퍼스 기반 신규 쿼리 수 (train 한정, 규모 확대)
    synth_chunks_per_query: 3         # 신규 쿼리 1개당 근거 청크 수
    leak_jaccard_threshold: 0.6       # 신규/val/test 쿼리 토큰 자카드 ≥이면 누수로 폐기

  # 품질 필터
  quality:
    min_answer_chars: 10
    max_answer_chars: 1500
    dedup: true                       # 정규화 텍스트 기준 중복 제거

  # 출력
  output:
    train_path: "finetune/data/sft_train.jsonl"   # SFT messages (증강 포함)
    val_path: "finetune/data/sft_val.jsonl"       # SFT messages (원본만, eval_loss용)
    test_path: "finetune/data/test.jsonl"         # held-out RAG-input (정량평가용)
    manifest_path: "finetune/data/dataset_manifest.json"
    include_fewshot: false            # 파인튜닝 시 few-shot 제외(형식은 타깃으로 학습)

# ─────────────────────────────────────────────────────────────
# 1b. 정량 평가 (base vs 파인튜닝, held-out test)
# ─────────────────────────────────────────────────────────────
eval:
  test_path: "finetune/data/test.jsonl"        # gold held-out
  test_synth_path: "finetune/data/test_synth.jsonl"  # 합성 held-out(약지도)
  warmup: 1                           # 첫 1회 warmup (latency 집계 제외)
  repeats: 3                          # 쿼리당 latency 반복측정(중앙값) — 노이즈 완화
  results_dir: "finetune/outputs/eval"
  # 답불가(abstain) 판정: relevant_chunk_ids 비었거나 query_id가 X로 시작

# ─────────────────────────────────────────────────────────────
# 1c. 합성 held-out 평가셋 확대 (통계력 보강, 약지도)
# ─────────────────────────────────────────────────────────────
synth_test:
  count: 40                           # 합성 test 쿼리 수
  chunks_per_query: 2                 # 정답 근거 청크 수(=relevant)
  distractors: 3                      # retrieved에 섞을 무관 청크 수
  leak_jaccard_threshold: 0.6         # train/val/gold-test와 유사하면 폐기

# ─────────────────────────────────────────────────────────────
# 2. QLoRA 학습
# ─────────────────────────────────────────────────────────────
train:
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  output_dir: "finetune/outputs/qwen2.5-7b-recrag-qlora"

  # 4bit (QLoRA) — T4 메모리 절약
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true

  # LoRA 어댑터
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                     "gate_proj", "up_proj", "down_proj"]

  # 시퀀스/배치 (T4 16GB 안전값)
  max_seq_len: 1536
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1       # 평가 OOM 방지(T4): eval logits는 vocab 15만×fp32라 큼
  gradient_accumulation_steps: 16     # 유효 배치 16
  num_train_epochs: 3
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  weight_decay: 0.0
  logging_steps: 5
  eval_steps: 20
  save_steps: 50
  save_total_limit: 2
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"           # bitsandbytes paged optimizer
  seed: 42
